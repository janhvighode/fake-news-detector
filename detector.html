<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fake News Detector</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="detector.html">Detector</a>
<a href="about.html">About AI</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<h1>Fake News Detector</h1>

<p>Paste a news article below and click Detect News.</p>

<textarea id="newsInput" placeholder="Paste news article here..."></textarea>

<br><br>

<button onclick="detectNews()">Detect News</button>

<button onclick="loadExample()">Load Example</button>

<button onclick="clearText()">Clear</button>

<div id="result"></div>

</div>

<script>

function detectNews(){

let text=document.getElementById("newsInput").value;

if(text.length<120){

document.getElementById("result").innerHTML=
"<h2 style='color:red'>Possible Fake News</h2><p>Trust Score: 35%</p>";

}

else{

document.getElementById("result").innerHTML=
"<h2 style='color:green'>Likely Real News</h2><p>Trust Score: 82%</p>";

}

}

function loadExample(){

document.getElementById("newsInput").value =
"Scientists claim that a newly discovered plant can charge mobile phones by storing solar energy in its leaves. Experts say more research is needed to verify the claim.";

}

function clearText(){

document.getElementById("newsInput").value="";
document.getElementById("result").innerHTML="";

}

</script>

</body>

</html>
